services:
  web:
    build: .
    container_name: dovetail_flask_app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:5000"
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    resources:
        limits:
          memory: 256M    # The maximum RAM the container can use
        reservations:
          memory: 56M    # The baseline RAM allocated to the containerresources:
      