<!doctype html>
<html>
  <head>
    <title>ChessBros</title>
  </head>
  <body style="background-color: darkslategrey">
    <div
      style="
        background-image: linear-gradient(to right, darkslategrey, white);
        width: 101%;
        height: 200px;
        border-radius: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
      "
    >
      <h1
        style="
          text-align: center;
          color: white;
          font-size: xx-large;
          font-weight: bolder;
          font-family:
            &quot;Lucida Sans&quot;, &quot;Lucida Sans Regular&quot;,
            &quot;Lucida Grande&quot;, &quot;Lucida Sans Unicode&quot;, Geneva,
            Verdana, sans-serif;
        "
      >
        ChessBros
      </h1>
    </div>
    <h1
      style="
        text-align: right;
        color: white;
        font-family:
          &quot;Lucida Sans&quot;, &quot;Lucida Sans Regular&quot;,
          &quot;Lucida Grande&quot;, &quot;Lucida Sans Unicode&quot;, Geneva,
          Verdana, sans-serif;
      "
    >
      ChessMax Response
    </h1>
    <!-- Python inserts the variable here -->
    <p
      style="
        text-align: right;
        color: white;
        font-family:
          &quot;Gill Sans&quot;, &quot;Gill Sans MT&quot;, Calibri,
          &quot;Trebuchet MS&quot;, sans-serif;
      "
    >
      Recommended move and confidence level: <br />
      {{ content }}
    </p>

    <form style="text-align: right" action="/submit" method="POST">
      <input
        type="text"
        id="lastmove"
        name="lastmove"
        placeholder="Enter last move?"
      />
      <button type="submit">Submit to ChessMax</button>
    </form>
  </body>
</html>
