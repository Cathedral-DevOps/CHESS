<!doctype html>
<!-- This HTML document uses both INLINED CSS (inline styles) and external CSS file -->
<html>
  <head>
    <!-- Page title shown in browser tab -->
    <title>ChessBros</title>
    <!-- Load JavaScript file from static folder with defer (loads after HTML parses) -->
    <script src="{{ url_for('static', filename='index.js') }}" defer></script>
    <!-- Set viewport for responsive design on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Set character encoding to UTF-8 for proper text display -->
    <meta charset="UTF-8" />
    <!-- Description for search engines -->
    <meta
      name="description"
      content="ChessBros - Your Ultimate Chess Companion"
    />
    <!-- Keywords for search engines -->
    <meta
      name="keywords"
      content="Chess, AI, ChessBros, Chess Companion, Chess Moves"
    />
    <!-- Link to external CSS stylesheet -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <!-- Body element with inline gradient background from blue to purple -->
  <body
    style="
      background-image: linear-gradient(
        to right,
        rgb(0, 12, 182),
        rgb(108, 0, 141)
      );
    "
  >
    <!-- Navigation bar at top of page -->
    <nav>
      <!-- Main navigation menu list -->
      <ul>
        <!-- Navigation link for Cathedral -->
        <li><a href="/">Cathedral</a></li>
        <!-- Navigation link for Play section -->
        <li><a href="/">Play</a></li>
        <!-- Navigation link for Home -->
        <li><a href="/">Home</a></li>
        <!-- Navigation link for Portfolio -->
        <li><a href="/">Portfolio</a></li>
      </ul>
      <!-- Sidebar navigation menu (hidden by default, shown on mobile) -->
      <ul class=\"sidebar\">
        <!-- Sidebar links -->
        <li><a href=\"/\">Cathedral</a></li>
        <li><a href=\"/\">Play</a></li>
        <li><a href=\"/\">Home</a></li>
        <li><a href=\"/\">Portfolio</a></li>
        <!-- Menu toggle button with hamburger icon SVG -->
          <a href=\"#\"
            ><!-- SVG hamburger menu icon (three horizontal lines) -->
            <svg
              xmlns=\"http://www.w3.org/2000/svg\"
              height=\"26\"
              viewBox=\"0 -960 960 960\"
              width=\"26\"
              fill=\"#e3e3e3\"
            >
              <!-- Three horizontal lines representing hamburger menu -->
              <path
                d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"
              /></svg
          ></a>
        </li>
      </ul>
    </nav>
    <div
      style="
        width: 101%;
        height: 200px;
        border-radius: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
      "
    >
      <h1
        style="
          text-align: center;
          color: white;
          font-size: xx-large;
          font-weight: bolder;
          font-family:
            &quot;Lucida Sans&quot;, &quot;Lucida Sans Regular&quot;,
            &quot;Lucida Grande&quot;, &quot;Lucida Sans Unicode&quot;, Geneva,
            Verdana, sans-serif;
        "
      >
        Play Against Bot
      </h1>
    </div>
    <h1
      style="
        text-align: flex-start;
        margin-bottom: 1em;
        color: white;
        font-family:
          &quot;Lucida Sans&quot;, &quot;Lucida Sans Regular&quot;,
          &quot;Lucida Grande&quot;, &quot;Lucida Sans Unicode&quot;, Geneva,
          Verdana, sans-serif;
      "
    >
      ChessMax Prediction
    </h1>
    <!-- Python inserts the variable here -->
    <p
      style="
        text-align: flex-start;
        color: white;
        font-family:
          &quot;Gill Sans&quot;, &quot;Gill Sans MT&quot;, Calibri,
          &quot;Trebuchet MS&quot;, sans-serif;
      "
      id="aiResponse"
    ></p>

    <form
      style="text-align: flex-start; margin-top: 1em; margin-bottom: 1em"
      id="chessForm"
    >
      <button id="moveButton" type="submit" style="margin-top: 1em">
        Submit to ChessMax
      </button>
    </form>
  </body>
</html>
